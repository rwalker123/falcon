syntax = "proto3";

package shadow_scale.commands;

option optimize_for = SPEED;

// NOTE: *_UNSPECIFIED entries are reserved and will be rejected by the runtime
// decode helpers. Clients must populate concrete values before sending envelopes.
enum SupportChannel {
  SUPPORT_CHANNEL_UNSPECIFIED = 0;
  SUPPORT_CHANNEL_POPULAR = 1;
  SUPPORT_CHANNEL_PEER = 2;
  SUPPORT_CHANNEL_INSTITUTIONAL = 3;
  SUPPORT_CHANNEL_HUMANITARIAN = 4;
}

enum InfluenceScopeKind {
  INFLUENCE_SCOPE_KIND_UNSPECIFIED = 0;
  INFLUENCE_SCOPE_KIND_LOCAL = 1;
  INFLUENCE_SCOPE_KIND_REGIONAL = 2;
  INFLUENCE_SCOPE_KIND_GLOBAL = 3;
  INFLUENCE_SCOPE_KIND_GENERATION = 4;
}

enum CorruptionSubsystem {
  CORRUPTION_SUBSYSTEM_UNSPECIFIED = 0;
  CORRUPTION_SUBSYSTEM_LOGISTICS = 1;
  CORRUPTION_SUBSYSTEM_TRADE = 2;
  CORRUPTION_SUBSYSTEM_MILITARY = 3;
  CORRUPTION_SUBSYSTEM_GOVERNANCE = 4;
}

enum OrdersDirective {
  ORDERS_DIRECTIVE_UNSPECIFIED = 0;
  ORDERS_DIRECTIVE_READY = 1;
}

message TurnCommand {
  uint32 steps = 1;
}

message ResetMapCommand {
  uint32 width = 1;
  uint32 height = 2;
}

message HeatCommand {
  uint64 entity_bits = 1;
  sint64 delta = 2;
}

message OrdersCommand {
  uint32 faction_id = 1;
  OrdersDirective directive = 2;
}

message RollbackCommand {
  uint64 tick = 1;
}

message AxisBiasCommand {
  uint32 axis = 1;
  float value = 2;
}

message SupportInfluencerCommand {
  uint32 id = 1;
  float magnitude = 2;
}

message SuppressInfluencerCommand {
  uint32 id = 1;
  float magnitude = 2;
}

message SupportInfluencerChannelCommand {
  uint32 id = 1;
  SupportChannel channel = 2;
  float magnitude = 3;
}

message SpawnInfluencerCommand {
  optional InfluenceScopeKind scope = 1;
  optional uint32 generation = 2;
}

message InjectCorruptionCommand {
  CorruptionSubsystem subsystem = 1;
  float intensity = 2;
  uint32 exposure_timer = 3;
}

message EspionageGeneratorUpdate {
  string template_id = 1;
  optional bool enabled = 2;
  optional uint32 per_faction = 3;
}

message UpdateEspionageGeneratorsCommand {
  repeated EspionageGeneratorUpdate updates = 1;
}

message QueueEspionageMissionCommand {
  string mission_id = 1;
  uint32 owner_faction = 2;
  uint32 target_owner_faction = 3;
  uint32 discovery_id = 4;
  uint32 agent_handle = 5;
  optional uint32 target_tier = 6;
  optional uint64 scheduled_tick = 7;
}

message UpdateEspionageQueueDefaultsCommand {
  optional uint32 scheduled_tick_offset = 1;
  optional uint32 target_tier = 2;
}

enum SecurityPolicyKind {
  SECURITY_POLICY_KIND_UNSPECIFIED = 0;
  SECURITY_POLICY_KIND_LENIENT = 1;
  SECURITY_POLICY_KIND_STANDARD = 2;
  SECURITY_POLICY_KIND_HARDENED = 3;
  SECURITY_POLICY_KIND_CRISIS = 4;
}

message UpdateCounterIntelPolicyCommand {
  uint32 faction = 1;
  SecurityPolicyKind policy = 2;
}

message AdjustCounterIntelBudgetCommand {
  uint32 faction = 1;
  optional float reserve = 2;
  optional float delta = 3;
}

enum ReloadConfigKind {
  RELOAD_CONFIG_KIND_UNSPECIFIED = 0;
  RELOAD_CONFIG_KIND_SIMULATION = 1;
  RELOAD_CONFIG_KIND_TURN_PIPELINE = 2;
  RELOAD_CONFIG_KIND_SNAPSHOT_OVERLAYS = 3;
  RELOAD_CONFIG_KIND_CRISIS_ARCHETYPES = 4;
  RELOAD_CONFIG_KIND_CRISIS_MODIFIERS = 5;
  RELOAD_CONFIG_KIND_CRISIS_TELEMETRY = 6;
}

message ReloadConfigCommand {
  ReloadConfigKind kind = 1;
  optional string path = 2;
}

message SetCrisisAutoSeedCommand {
  bool enabled = 1;
}

message SpawnCrisisCommand {
  uint32 faction = 1;
  string archetype_id = 2;
}

message SetStartProfileCommand {
  string profile_id = 1;
}

message ScoutAreaCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
  optional uint64 band_entity_bits = 4;
}

message FollowHerdCommand {
  uint32 faction_id = 1;
  string herd_id = 2;
  optional string policy = 3;
  optional uint64 band_entity_bits = 4;
}

message FoundSettlementCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
}

message ForageTileCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
  string module = 4;
  optional uint64 band_entity_bits = 5;
}

message HuntGameCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
  optional uint64 band_entity_bits = 4;
}

message HuntFaunaCommand {
  uint32 faction_id = 1;
  string herd_id = 2;
  optional uint64 band_entity_bits = 3;
}

message DomesticateCommand {
  uint32 faction_id = 1;
  string herd_id = 2;
}

message CultivateCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
}

// Rung 1c: pen the domesticated herd standing on the target tile into a fixed corral (needs Herding
// knowledge, built by Sustain-hunting a Thriving herd). A corralled herd stops roaming and pays its
// keeper place-local.
message CorralCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
}

// Grazing 2d-beta: grow the fenced footprint of a built pen by one ring (pen_radius += 1), worked off
// over turns by the keeper band's labor (the corral build ladder). Needs Herding knowledge, an owned
// penned herd whose corral tile is (target_x, target_y), pen_radius below the configured max, and no
// extension already in flight.
message ExtendPenCommand {
  uint32 faction_id = 1;
  uint32 target_x = 2;
  uint32 target_y = 3;
}

message CancelOrderCommand {
  uint32 faction_id = 1;
  optional uint64 band_entity_bits = 2;
}

// Early-Game Labor (slice 3a): set the worker count for one labor target on a band
// (idempotent; 0 unassigns; clamped to the band's free working-age headroom).
message AssignLaborCommand {
  uint32 faction_id = 1;
  optional uint64 band_entity_bits = 2;
  string role = 3;              // "forage" | "hunt" | "scout" | "warrior"
  uint32 workers = 4;
  optional uint32 target_x = 5; // forage tile
  optional uint32 target_y = 6;
  optional string fauna_id = 7; // hunt target herd
  optional string policy = 8;   // hunt take policy (sustain|surplus|market|eradicate)
}

// Travel a band toward a target tile at band_move_tiles_per_turn/turn.
message MoveBandCommand {
  uint32 faction_id = 1;
  optional uint64 band_entity_bits = 2;
  uint32 target_x = 3;
  uint32 target_y = 4;
}

// Outfit and launch a scouting expedition: draw party_workers + provisions off the home band and
// send a detached traveling party toward the target tile.
message SendExpeditionCommand {
  uint32 faction_id = 1;
  optional uint64 band_entity_bits = 2;
  uint32 party_workers = 3;
  uint32 target_x = 4;
  uint32 target_y = 5;
}

// Order an in-flight expedition home (phase -> Returning; folds back on arrival).
message RecallExpeditionCommand {
  uint32 faction_id = 1;
  uint64 expedition_entity_bits = 2;
}

// Outfit and launch a hunting expedition: draw party_workers off the home band and send a detached
// party to follow the herd fauna_id (lives off its kills — no provisions drawn).
message SendHuntExpeditionCommand {
  uint32 faction_id = 1;
  optional uint64 band_entity_bits = 2;
  uint32 party_workers = 3;
  string fauna_id = 4;
  optional string policy = 5; // sustain|surplus|market|eradicate; default sustain when omitted
}

message ExportMapCommand {
  // Optional destination path. When absent the server writes a
  // timestamped file into the gitignored exports/ scratch directory.
  optional string path = 1;
}

message CommandEnvelope {
  optional uint64 correlation_id = 15;

  reserved 24;
  reserved "found_camp";

  oneof command {
    TurnCommand turn = 1;
    ResetMapCommand reset_map = 11;
    HeatCommand heat = 2;
    OrdersCommand orders = 3;
    RollbackCommand rollback = 4;
    AxisBiasCommand axis_bias = 5;
    SupportInfluencerCommand support_influencer = 6;
    SuppressInfluencerCommand suppress_influencer = 7;
    SupportInfluencerChannelCommand support_channel = 8;
    SpawnInfluencerCommand spawn_influencer = 9;
    InjectCorruptionCommand inject_corruption = 10;
    UpdateEspionageGeneratorsCommand update_espionage_generators = 12;
    QueueEspionageMissionCommand queue_espionage_mission = 13;
    UpdateEspionageQueueDefaultsCommand update_espionage_queue_defaults = 14;
    UpdateCounterIntelPolicyCommand update_counter_intel_policy = 17;
    AdjustCounterIntelBudgetCommand adjust_counter_intel_budget = 18;
    ReloadConfigCommand reload_config = 16;
    SetCrisisAutoSeedCommand set_crisis_auto_seed = 19;
    SpawnCrisisCommand spawn_crisis = 20;
    SetStartProfileCommand set_start_profile = 21;
    ScoutAreaCommand scout_area = 22;
    FollowHerdCommand follow_herd = 23;
    ForageTileCommand forage_tile = 25;
    HuntGameCommand hunt_game = 26;
    FoundSettlementCommand found_settlement = 27;
    ExportMapCommand export_map = 28;
    HuntFaunaCommand hunt_fauna = 29;
    DomesticateCommand domesticate = 30;
    CancelOrderCommand cancel_order = 31;
    AssignLaborCommand assign_labor = 32;
    MoveBandCommand move_band = 33;
    SendExpeditionCommand send_expedition = 34;
    RecallExpeditionCommand recall_expedition = 35;
    SendHuntExpeditionCommand send_hunt_expedition = 36;
    CultivateCommand cultivate = 37;
    CorralCommand corral = 38;
    ExtendPenCommand extend_pen = 39;
  }
}
